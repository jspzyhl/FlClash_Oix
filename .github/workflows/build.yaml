name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  GO_VERSION: '1.26'
  MSYS_NO_PATHCONV: 1

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      full_version: ${{ steps.version.outputs.full_version }}
      version_number: ${{ steps.version.outputs.version_number }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        env:
          TZ: UTC
        run: |
          set -e
          VERSION_NUMBER=$(grep -E "^version:" pubspec.yaml | sed -E 's/^version:[[:space:]]*([0-9.]+).*/\1/')
          
          UTC_NOW=$(date -u '+%Y-%m-%d %H:%M:%S')
          BUILD_NUMBER=$(date -u -d "$UTC_NOW 8 hours" '+%Y%m%d%H' 2>/dev/null || date -u -v+8H -j -f '%Y-%m-%d %H:%M:%S' "$UTC_NOW" '+%Y%m%d%H')
          
          FULL_VERSION="${VERSION_NUMBER}+${BUILD_NUMBER}"
          
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          
          echo "Generated version: $FULL_VERSION"
          echo "  Version number: $VERSION_NUMBER"
          echo "  Build number: $BUILD_NUMBER"

  build:
    name: "Build ${{ matrix.name }}"
    needs: [version]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            arch: arm64
            name: "Android (arm64)"
          - platform: android
            os: ubuntu-latest
            arch: arm
            name: "Android (arm)"
          - platform: android
            os: ubuntu-latest
            arch: amd64
            name: "Android (x64)"
          - platform: windows
            os: Windows-2022
            arch: amd64
            name: "Windows x64"
          # - platform: windows
          # os: windows-11-arm
          # arch: arm64
          # name: "Windows arm64"
          - platform: macos
            os: macos-15-intel
            arch: amd64
            name: "macOS Intel x64"
          - platform: macos
            os: macos-latest
            arch: arm64
            name: "macOS Apple Silicon"
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
            name: "Linux x64"
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
            name: "Linux arm64"

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Build Application
        id: build
        shell: bash
        env:
          FLUTTER_VERSION_NUMBER: ${{ needs.version.outputs.version_number }}
          FLUTTER_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          API_ROUTER: ${{ secrets.API_ROUTER }}
          PROFILE_KEY: ${{ secrets.PROFILE_KEY }}
        run: |
          set -e
          BUILD_ARGS="${{ matrix.platform }}"
          [ -n "${{ matrix.arch }}" ] && BUILD_ARGS="$BUILD_ARGS --arch ${{ matrix.arch }}"
          BUILD_ARGS="$BUILD_ARGS --out app"
          [ "${{ env.IS_STABLE }}" == "true" ] && BUILD_ARGS="$BUILD_ARGS --env stable"
          dart setup.dart $BUILD_ARGS
          
          find ./dist -name "*.exe" -type f -exec sh -c 'mv "$1" "${1%.exe}-setup.exe"' _ {} \;
          find ./dist -name "*.appimage" -type f -exec sh -c 'mv "$1" "${1%.appimage}.AppImage"' _ {} \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [ version, build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')
          
          tags=($(git tag --merged HEAD --sort=-creatordate))
          
          temp="NEW_CHANGELOG.md" > "$temp"
          
          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break
          
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
          
              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"
          
          mv "$temp" CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [ version, build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=($(git tag --merged HEAD --sort=-creatordate))
          preTag=$(curl -s "https://api.github.com/repos/pickrui/FlClash/releases/latest" | grep -Po '"tag_name": "\K.*?(?=")' || echo "")
          out="release.md" > "$out"
          for i in "${!tags[@]}"; do
            curr="${tags[i]}"
            [[ "$curr" == "$preTag" ]] && break

            prev="${tags[i+1]}"
            range="${prev:+$prev..}$curr"

            echo -e "## $curr\n" >> "$out"
            git log --no-merges --pretty=format:"%B" "$range" | \
            awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'

      - name: Update Version via oixCloud API
        if: success() && env.IS_STABLE == 'true'
        continue-on-error: true
        run: |
          API_KEY="${{ secrets.API_KEY }}"
          API_URL="https://${{ secrets.API_DOMAIN }}/api/v1/version/update"
          FULL_VERSION="${{ needs.version.outputs.full_version }}"
          
          if [ -z "$API_KEY" ]; then
            echo "⚠️  Skipping version update: API_KEY secret not configured"
            exit 0
          fi
          
          if [ -z "$FULL_VERSION" ]; then
            echo "❌ Error: Version number not available"
            exit 1
          fi
          
          echo "📦 Updating oixCloud version to: $FULL_VERSION"
          
          response=$(curl -s -w "\n%{http_code}" -X POST "$API_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "key=$API_KEY" \
            --data-urlencode "version=$FULL_VERSION")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response body: $body"
          
          if [ "$http_code" = "200" ]; then
            echo "✅ Version updated successfully on oixCloud"
            echo "   Version: $FULL_VERSION"
            echo "   API: $API_URL"
          else
            echo "❌ Failed to update version"
            echo "   HTTP Status: $http_code"
            echo "   Response: $body"
            exit 1
          fi
